<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Carlos Web</title>
  <style>
    body {
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }
    h1 {
      color: #333;
    }
    p {
      font-size: 1.2em;
      color: #555;
    }
    form {
      display: inline-block;
      background-color: #fff;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }
    input[type="text"],
    input[type="password"] {
      width: 200px;
      padding: 8px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    input[type="submit"] {
      padding: 10px 20px;
      border: none;
      background-color: #007BFF;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    input[type="submit"]:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Bienvenido</h1>
  <p>Identifíquese por favor</p>
  <form method="POST" action="/login">
    <div>
      Usuario:<br>
      <input type="text" name="username" required>
    </div>
    <div>
      Contraseña:<br>
      <input type="password" name="password" required>
    </div>
    <div>
      <input type="submit" value="Entrar">
    </div>
  </form>
</body>
</html>
