ddns-update-style interim;
ignore client-updates;
authoritative;

subnet 10.5.2.192 netmask 255.255.255.192 {
    ange 10.5.2.194 10.5.2.254;     				# Range (10.5.2.128/26) of IP addresses to be issued to DHCP clients
    option subnet-mask 255.255.255.192;    			# Default subnet mask to be used by DHCP clients
    option broadcast-address 10.5.2.255;  			# Default broadcast address to be used by DHCP clients
    option routers 10.5.2.193;         				# Default gateway to be used by DHCP clients
    option domain-name-servers 10.5.2.193, 8.8.8.8, 8.8.4.4;  	# Default DNS to be used by DHCP client
    #option ipforwarding off;

    default-lease-time 21600;    				    # Amount of time in seconds that a client may keep the IP address
    max-lease-time 43200;
}
